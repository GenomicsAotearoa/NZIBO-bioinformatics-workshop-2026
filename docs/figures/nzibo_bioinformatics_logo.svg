<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <!-- DNA strand gradients -->
    <linearGradient id="dnaGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#009F5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005A36;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dnaGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9E5600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a4000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="kiwiBod" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a3a1a" />
      <stop offset="100%" style="stop-color:#3d2610" />
    </linearGradient>
    <linearGradient id="glowGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#009F5F;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#009F5F;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="centerClip">
      <circle cx="300" cy="220" r="160"/>
    </clipPath>
  </defs>

  <!-- ========= CELL-LIKE BACKGROUND ========= -->
  <!-- Outer membrane - slightly wobbly -->
  <path d="M 300,25 C 355,22 410,45 445,80 C 480,115 498,162 495,215
           C 492,268 472,318 440,352 C 408,386 362,410 310,415
           C 258,420 205,402 170,368 C 135,334 112,282 108,228
           C 104,174 120,120 152,84 C 184,48 245,28 300,25 Z"
        fill="#009F5F" opacity="0.05"/>
  <!-- Membrane border - wobbly, not perfect circle -->
  <path d="M 300,25 C 355,22 410,45 445,80 C 480,115 498,162 495,215
           C 492,268 472,318 440,352 C 408,386 362,410 310,415
           C 258,420 205,402 170,368 C 135,334 112,282 108,228
           C 104,174 120,120 152,84 C 184,48 245,28 300,25 Z"
        fill="none" stroke="#009F5F" stroke-width="2" stroke-dasharray="10 5" opacity="0.3"/>
  <!-- Inner nuclear membrane -->
  <ellipse cx="298" cy="222" rx="105" ry="92" fill="none" stroke="#005A36" stroke-width="1" stroke-dasharray="5 4" opacity="0.2"/>
  <!-- Nucleus fill hint -->
  <ellipse cx="298" cy="222" rx="105" ry="92" fill="#009F5F" opacity="0.03"/>
  <!-- A few organelle dots (ribosomes / vesicles suggestion) -->
  <circle cx="175" cy="150" r="4"  fill="none" stroke="#009F5F" stroke-width="1" opacity="0.2"/>
  <circle cx="420" cy="145" r="3"  fill="none" stroke="#009F5F" stroke-width="1" opacity="0.18"/>
  <circle cx="162" cy="320" r="5"  fill="none" stroke="#005A36" stroke-width="1" opacity="0.18"/>
  <circle cx="430" cy="340" r="4"  fill="none" stroke="#005A36" stroke-width="1" opacity="0.2"/>
  <circle cx="195" cy="390" r="3.5" fill="none" stroke="#009F5F" stroke-width="1" opacity="0.15"/>
  <circle cx="400" cy="390" r="3"  fill="none" stroke="#009F5F" stroke-width="1" opacity="0.15"/>
  <!-- Small ER-like squiggle top-left of nucleus -->
  <path d="M 210,175 Q 222,168 230,178 Q 238,188 250,180" fill="none" stroke="#009F5F" stroke-width="1" opacity="0.2"/>
  <!-- Small ER-like squiggle bottom-right -->
  <path d="M 350,290 Q 362,282 370,292 Q 378,302 390,295" fill="none" stroke="#009F5F" stroke-width="1" opacity="0.2"/>

  <!-- ========= DNA HELIX - LEFT STRAND ========= -->
  <!--
    Strand A (green):  sine wave centred at x=145, amplitude=30
      xA(y) = 145 + 30*sin((y-60)/60 * pi)   [peaks right, troughs left]
    Strand B (dark):   xB(y) = 145 - 30*sin(...)   [opposite phase]
    Rungs placed every ~27px in y, endpoints = exact x values from formula.
    At crossover points the two strands meet (x≈145), rung length → 0 (hidden).
    Wide rungs at peaks/troughs, narrow near crossovers.
  -->

  <!-- Strand A -->
  <path d="M 115,60 C 140,72 160,95 155,120 C 150,145 125,162 120,188
           C 115,214 135,238 150,255 C 165,272 170,292 165,318
           C 160,344 135,362 130,388 C 125,410 140,428 155,440"
        fill="none" stroke="#009F5F" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <!-- Strand B -->
  <path d="M 175,60 C 150,72 130,95 135,120 C 140,145 165,162 170,188
           C 175,214 155,238 140,255 C 125,272 120,292 125,318
           C 130,344 155,362 160,388 C 165,410 150,428 135,440"
        fill="none" stroke="#005A36" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>

  <!-- Rungs: endpoints sampled directly from the paths above -->
  <!-- y=75  wide: A=130, B=160 -->
  <line x1="130" y1="75"  x2="160" y2="75"  stroke="#9E5600" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="130" cy="75"  r="3.5" fill="#9E5600" opacity="0.9"/>
  <circle cx="160" cy="75"  r="3.5" fill="#9E5600" opacity="0.9"/>

  <!-- y=100 wide: A=157, B=133 -->
  <line x1="133" y1="100" x2="157" y2="100" stroke="#009F5F" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="133" cy="100" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>
  <circle cx="157" cy="100" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>

  <!-- y=125 crossover: A≈145 B≈145 — skip (nearly zero length) -->

  <!-- y=148 wide: A=120, B=170 -->
  <line x1="121" y1="148" x2="169" y2="148" stroke="#9E5600" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="121" cy="148" r="3.5" fill="#9E5600" opacity="0.9"/>
  <circle cx="169" cy="148" r="3.5" fill="#9E5600" opacity="0.9"/>

  <!-- y=172 medium: A=126, B=164 -->
  <line x1="126" y1="172" x2="164" y2="172" stroke="#009F5F" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="126" cy="172" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>
  <circle cx="164" cy="172" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>

  <!-- y=196 crossover — skip -->

  <!-- y=222 wide: A=150, B=140 — strands flipped -->
  <line x1="138" y1="222" x2="162" y2="222" stroke="#9E5600" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="138" cy="222" r="3.5" fill="#9E5600" opacity="0.9"/>
  <circle cx="162" cy="222" r="3.5" fill="#9E5600" opacity="0.9"/>

  <!-- y=248 medium -->
  <line x1="132" y1="248" x2="158" y2="248" stroke="#009F5F" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="132" cy="248" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>
  <circle cx="158" cy="248" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>

  <!-- y=270 crossover — skip -->

  <!-- y=295 wide -->
  <line x1="122" y1="295" x2="168" y2="295" stroke="#9E5600" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="122" cy="295" r="3.5" fill="#9E5600" opacity="0.9"/>
  <circle cx="168" cy="295" r="3.5" fill="#9E5600" opacity="0.9"/>

  <!-- y=320 medium -->
  <line x1="127" y1="320" x2="163" y2="320" stroke="#009F5F" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="127" cy="320" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>
  <circle cx="163" cy="320" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>

  <!-- y=345 crossover — skip -->

  <!-- y=368 wide -->
  <line x1="132" y1="368" x2="158" y2="368" stroke="#9E5600" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="132" cy="368" r="3.5" fill="#9E5600" opacity="0.9"/>
  <circle cx="158" cy="368" r="3.5" fill="#9E5600" opacity="0.9"/>

  <!-- y=393 medium -->
  <line x1="128" y1="393" x2="162" y2="393" stroke="#009F5F" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="128" cy="393" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>
  <circle cx="162" cy="393" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>

  <!-- y=420 crossover — skip -->

  <!-- y=436 wide -->
  <line x1="136" y1="436" x2="154" y2="436" stroke="#9E5600" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="136" cy="436" r="3.5" fill="#9E5600" opacity="0.9"/>
  <circle cx="154" cy="436" r="3.5" fill="#9E5600" opacity="0.9"/>

  <!-- ========= DNA HELIX - RIGHT STRAND (offset phase — starts mid-cycle) ========= -->
  <!-- Strand A — starts near a trough, so first rung is narrow then widens -->
  <path d="M 455,60 C 468,75 478,98 472,125 C 466,152 445,168 438,195
           C 431,222 445,248 460,268 C 475,288 482,312 476,338
           C 470,364 448,380 442,406 C 436,428 450,438 465,445"
        fill="none" stroke="#009F5F" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <!-- Strand B opposite phase -->
  <path d="M 495,60 C 482,75 470,98 476,125 C 482,152 502,168 508,195
           C 514,222 500,248 485,268 C 470,288 463,312 469,338
           C 475,364 496,380 502,406 C 508,428 494,438 479,445"
        fill="none" stroke="#005A36" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>

  <!-- Rungs — sampled from these paths, phase offset so different from left -->
  <!-- y=72 narrow (near crossover start) -->
  <line x1="460" y1="72" x2="490" y2="72" stroke="#009F5F" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="460" cy="72" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>
  <circle cx="490" cy="72" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>

  <!-- y=98 wide trough A left, B right -->
  <line x1="448" y1="98" x2="504" y2="98" stroke="#9E5600" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="448" cy="98" r="3.5" fill="#9E5600" opacity="0.9"/>
  <circle cx="504" cy="98" r="3.5" fill="#9E5600" opacity="0.9"/>

  <!-- y=124 medium -->
  <line x1="442" y1="124" x2="480" y2="124" stroke="#009F5F" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="442" cy="124" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>
  <circle cx="480" cy="124" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>

  <!-- y=152 crossover — skip -->

  <!-- y=178 wide -->
  <line x1="438" y1="178" x2="510" y2="178" stroke="#9E5600" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="438" cy="178" r="3.5" fill="#9E5600" opacity="0.9"/>
  <circle cx="510" cy="178" r="3.5" fill="#9E5600" opacity="0.9"/>

  <!-- y=204 medium -->
  <line x1="440" y1="204" x2="504" y2="204" stroke="#009F5F" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="440" cy="204" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>
  <circle cx="504" cy="204" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>

  <!-- y=228 crossover — skip -->

  <!-- y=252 wide -->
  <line x1="448" y1="252" x2="498" y2="252" stroke="#9E5600" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="448" cy="252" r="3.5" fill="#9E5600" opacity="0.9"/>
  <circle cx="498" cy="252" r="3.5" fill="#9E5600" opacity="0.9"/>

  <!-- y=276 medium -->
  <line x1="452" y1="276" x2="490" y2="276" stroke="#009F5F" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="452" cy="276" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>
  <circle cx="490" cy="276" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>

  <!-- y=304 crossover — skip -->

  <!-- y=328 wide -->
  <line x1="444" y1="328" x2="506" y2="328" stroke="#9E5600" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="444" cy="328" r="3.5" fill="#9E5600" opacity="0.9"/>
  <circle cx="506" cy="328" r="3.5" fill="#9E5600" opacity="0.9"/>

  <!-- y=354 medium -->
  <line x1="443" y1="354" x2="500" y2="354" stroke="#009F5F" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="443" cy="354" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>
  <circle cx="500" cy="354" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>

  <!-- y=380 crossover — skip -->

  <!-- y=406 wide -->
  <line x1="443" y1="406" x2="502" y2="406" stroke="#9E5600" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="443" cy="406" r="3.5" fill="#9E5600" opacity="0.9"/>
  <circle cx="502" cy="406" r="3.5" fill="#9E5600" opacity="0.9"/>

  <!-- y=432 medium -->
  <line x1="449" y1="432" x2="486" y2="432" stroke="#009F5F" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="449" cy="432" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>
  <circle cx="486" cy="432" r="3.5" fill="#009F5F" opacity="0.9" filter="url(#glow)"/>

  <!-- ========= CODE SNIPPET - floating behind ========= -->
  <!-- Code block left -->
  <text x="20" y="290" font-family="'Courier New', monospace" font-size="9" fill="#009F5F" opacity="0.35">library(Biostrings)</text>
  <text x="20" y="305" font-family="'Courier New', monospace" font-size="9" fill="#9E5600" opacity="0.3">seq &lt;- readDNAStringSet(</text>
  <text x="20" y="320" font-family="'Courier New', monospace" font-size="9" fill="#009F5F" opacity="0.25">  "genome.fasta")</text>

  <!-- Code block right lower -->
  <text x="390" y="290" font-family="'Courier New', monospace" font-size="9" fill="#009F5F" opacity="0.35">ggplot(data, aes(x,y))</text>
  <text x="390" y="305" font-family="'Courier New', monospace" font-size="9" fill="#9E5600" opacity="0.3">+ geom_point(color=</text>
  <text x="390" y="320" font-family="'Courier New', monospace" font-size="9" fill="#009F5F" opacity="0.25">  "#009F5F")</text>

  <!-- Code block top-right near kiwi head -->
  <text x="348" y="108" font-family="'Courier New', monospace" font-size="9" fill="#9E5600" opacity="0.32">blast_res &lt;- blastn(</text>
  <text x="348" y="120" font-family="'Courier New', monospace" font-size="9" fill="#009F5F" opacity="0.28">  query, db="nt")</text>
  <text x="348" y="132" font-family="'Courier New', monospace" font-size="9" fill="#9E5600" opacity="0.22">filter(e_val &lt; 0.001)</text>

  <!-- ========= KIWI BIRD - centre ========= -->
  <!-- Body -->
  <ellipse cx="300" cy="235" rx="88" ry="72" fill="url(#kiwiBod)"/>
  <!-- Wing feather texture overlay -->
  <ellipse cx="295" cy="230" rx="82" ry="65" fill="none" stroke="#6b4420" stroke-width="1" opacity="0.4"/>
  <ellipse cx="295" cy="230" rx="68" ry="52" fill="none" stroke="#7a5030" stroke-width="0.8" opacity="0.3"/>
  <!-- Feather lines -->
  <path d="M 225,230 Q 250,215 290,220" fill="none" stroke="#7a5030" stroke-width="1" opacity="0.4"/>
  <path d="M 220,248 Q 252,235 295,240" fill="none" stroke="#7a5030" stroke-width="1" opacity="0.35"/>
  <path d="M 228,265 Q 258,255 295,258" fill="none" stroke="#7a5030" stroke-width="1" opacity="0.3"/>
  <path d="M 370,230 Q 345,215 308,220" fill="none" stroke="#7a5030" stroke-width="1" opacity="0.4"/>
  <path d="M 375,248 Q 348,235 305,240" fill="none" stroke="#7a5030" stroke-width="1" opacity="0.35"/>
  <path d="M 367,265 Q 342,255 305,258" fill="none" stroke="#7a5030" stroke-width="1" opacity="0.3"/>

  <!-- Neck -->
  <path d="M 258,175 Q 270,155 295,148 Q 320,142 330,158 Q 338,172 330,185 Q 315,170 300,168 Q 282,168 268,180 Z" fill="#4a2e10"/>

  <!-- Head -->
  <ellipse cx="307" cy="148" rx="32" ry="28" fill="#4a2e10"/>

  <!-- Eye -->
  <circle cx="320" cy="142" r="8" fill="#1a0f05"/>
  <circle cx="320" cy="142" r="5.5" fill="#2d1a08"/>
  <circle cx="322" cy="140" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="320" cy="142" r="1.5" fill="#009F5F" opacity="0.6"/>

  <!-- Beak - long and curved characteristic kiwi beak -->
  <path d="M 330,148 Q 355,143 385,138 Q 400,135 405,138 Q 400,142 385,144 Q 360,150 338,156 Z" fill="#9E5600"/>
  <path d="M 330,148 Q 355,143 385,138" fill="none" stroke="#7a4000" stroke-width="1" opacity="0.6"/>
  <!-- Beak nostril -->
  <ellipse cx="375" cy="139" rx="4" ry="2" fill="#7a4000" opacity="0.7"/>

  <!-- Legs -->
  <path d="M 270,302 L 262,330 L 255,340 M 262,330 L 272,342" fill="none" stroke="#8B6914" stroke-width="4" stroke-linecap="round"/>
  <path d="M 318,305 L 315,333 L 308,343 M 315,333 L 325,345" fill="none" stroke="#8B6914" stroke-width="4" stroke-linecap="round"/>

  <!-- Foot claws -->
  <path d="M 255,340 L 248,346 M 255,340 L 252,348 M 272,342 L 265,348" fill="none" stroke="#7a5a10" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 308,343 L 301,349 M 308,343 L 305,351 M 325,345 L 318,351" fill="none" stroke="#7a5a10" stroke-width="2.5" stroke-linecap="round"/>



  <!-- ========= FLOATING CODE BITS around kiwi ========= -->
  <!-- ATCG nucleotide letters scattered -->
  <text x="208" y="168" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#009F5F" opacity="0.55" filter="url(#glow)">A</text>
  <text x="370" y="162" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#9E5600" opacity="0.55">T</text>
  <text x="215" y="310" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#9E5600" opacity="0.55">C</text>
  <text x="362" y="318" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#009F5F" opacity="0.55" filter="url(#glow)">G</text>


  <!-- Small binary / code bits -->
  <text x="200" y="220" font-family="'Courier New', monospace" font-size="8" fill="#009F5F" opacity="0.3">ATCGGT</text>
  <text x="355" y="220" font-family="'Courier New', monospace" font-size="8" fill="#009F5F" opacity="0.3">GCATCA</text>

  <!-- ========= CIRCULAR BADGE / ARC TEXT ========= -->



</svg>
